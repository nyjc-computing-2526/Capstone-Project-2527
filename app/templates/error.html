<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {% include "partials/stylesheets.html" %}
    <title>{{ code }} – Error</title>
  </head>
  <body class="auth-page">

    </div>
  </body>
</html>
