<!doctype html>
<html>
  <head>
    <link rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}" />
    <title>Forgot Password</title>
  </head>

  <body>
    <div class="authcontainer">
      <div class="login-card">
        <h1>Forgot password?</h1>

        <form action="/forgot-password" method="POST">
          <input type="hidden" name="email" value="{{ email or '' }}">

          <div class="input-fields-container forgot-password-form">

            <div class="input-group email-group forgot-email-row">
              <input type="email" name="email_input"
                     placeholder="Email" required />

              <button type="submit" name="action" value="send"
                      class="verify-btn">
                Send Code
              </button>
            </div>

            <div class="input-group forgot-wide-row">
              <input type="text" name="code"
                     placeholder="Verification code" />
            </div>

            <div class="input-group forgot-wide-row">
              <input type="password" name="new_password"
                     placeholder="New password" />
            </div>

          </div>

          <button type="submit" name="action" value="verify">
            Reset Password
          </button>

        </form>

        <a href="/login" class="forgot-pass">Back to login</a>
      </div>
    </div>
  </body>
</html>
