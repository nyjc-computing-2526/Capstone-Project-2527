<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My activities</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <header>
      <ul>
        <li><a href="/home">Home</a></li>
        <li><a href="/activities">All Activities</a></li>
        <li><a href="/activities/personal">My Activities</a></li>
        <li><a href="/activities/create">Create activity</a></li>
      </ul>
      <a href="/auth/logout" class="logout">Log Out</a>
    </header>

    <main>
      <div class="content">
        <h1>My activities</h1>

        <div class="input-row">
          <span>sort by:</span>
          <div class="input-group">
            <select name="sort" id="sort-order">
              <option value="earliest" selected>Earliest first</option>
              <option value="latest">Latest first</option>
            </select>
          </div>
        </div>

        <div class="activities">
          {% for activity in activities or [] %}
          <a
            href="{{ url_for('activities.view_activity', id=activity.id) }}"
            class="activity-card-link"
          >
            <div class="activity-card">
              <h3>{{ activity.title | default('Untitled') }}</h3>
              <p>{{ activity.display_time }}</p>
              <p>{{ activity.display_date }}</p>
            </div>
          </a>
          {% endfor %}
        </div>
      </div>
    </main>
  </body>
</html>
