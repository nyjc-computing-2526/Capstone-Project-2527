<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My activities</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <header>
      <ul>
        <li><a href="{{ url_for('landing.homepage') }}">Home</a></li>
        <li><a href="{{ url_for('activities.activities') }}">All Activities</a></li>
        <li><a href="{{ url_for('activities.my_activities') }}">My Activities</a></li>
        <li><a href="{{ url_for('activities.create_activities') }}">Create Activity</a></li>
        <li><a href="/auth/view">View Profile</a></li>
      </ul>
      <form action="{{ url_for('auth.logout') }}" method="POST" style="margin-left: auto;">
        <button type="submit" class="logout" style="background:none; border:none; color:red; font-weight:bold; font-size:1rem; cursor:pointer; padding:0; width:auto; max-width:none;">Log Out</button>
      </form>
    </header>

    <main>
      <div class="content">
        <h1>My activities</h1>

        <div class="input-row">
          <span>sort by:</span>
          <div class="input-group">
            <select name="sort" id="sort-order">
              <option value="earliest" selected>Earliest first</option>
              <option value="latest">Latest first</option>
            </select>
          </div>
        </div>

        <div class="activities">
          {% for activity in activities or [] %}
          <a
            href="{{ url_for('activities.activity_details', id=activity.id) }}"
            class="activity-card-link"
          >
            <div class="activity-card">
              <h3>{{ activity.title | default('Untitled') }}</h3>
              <p>{{ activity.display_time }}</p>
              <p>{{ activity.display_date }}</p>
            </div>
          </a>
          {% endfor %}
        </div>
      </div>
    </main>
  </body>
</html>
