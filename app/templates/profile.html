<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Profile</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <header>
      <ul>
        <li><a href="/home">Home</a></li>
        <li><a href="/allactivities">All Activities</a></li>
        <li><a href="/myactivities">My Activities</a></li>
        <li><a href="/create">Create activity</a></li>
      </ul>
      <a href="/login" class="logout">Log Out</a>
    </header>

    <main class="profile-page">
      <section class="page-card profile-card">
        <h1>Profile</h1>

        <div class="profile-avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" role="img">
            <circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="2" />
            <path
              d="M5 19v-1c0-2.8 3.1-4.5 7-4.5s7 1.7 7 4.5v1"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>

        <p class="profile-name">Jeff Wong</p>
        <a href="mailto:jeff.wong_2025@nyjc.edu.sg" class="profile-email"
          >jeff.wong_2025@nyjc.edu.sg</a
        >

        <div class="profile-actions-row">
          <button type="button" class="profile-delete-btn">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M4 7h16M9 7V5h6v2M8 7v11m4-11v11m4-11v11M7 20h10"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span>Delete Account</span>
          </button>
          <a
            href="{{ url_for('auth_update') }}"
            class="profile-edit-btn"
            aria-label="Edit profile"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span>Edit profile</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
